# -- API group name for the webhook solver.
# This must match the groupName in your ClusterIssuer/Issuer webhook configuration.
# Use a unique domain you own to avoid conflicts with other webhook solvers.
groupName: acme.example.com

# -- Solver name registered with cert-manager.
# This must match the solverName in your ClusterIssuer/Issuer webhook configuration.
solverName: technitium

# -- cert-manager configuration
certManager:
  # -- Namespace where cert-manager is installed
  namespace: cert-manager
  # -- Service account name used by cert-manager
  serviceAccountName: cert-manager

# -- Container image configuration
image:
  # -- Image repository
  repository: ghcr.io/cocakoala-network/cert-manager-technitium-webhook
  # -- Image tag (defaults to Chart appVersion)
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Number of webhook replicas
replicaCount: 1

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 443

# -- HTTP client configuration for Technitium API requests
httpClient:
  # -- Request timeout (Go duration format)
  timeout: "30s"
  # -- Skip TLS certificate verification (for self-signed certs)
  tlsInsecureSkipVerify: false
  # -- Maximum number of idle connections
  maxIdleConns: 10
  # -- Idle connection timeout (Go duration format)
  idleConnTimeout: "90s"

# -- Pod resource limits and requests
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 50m
  #   memory: 64Mi

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Additional environment variables to set on the webhook container
extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
